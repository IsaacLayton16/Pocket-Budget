<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0f172a" />
    <title>Pocket Budget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        color-scheme: light;
        --ink: #172033;
        --muted: #667085;
        --line: #d9dee8;
        --paper: #f7f4ee;
        --panel: #fffdf8;
        --navy: #172033;
        --teal: #0f8b8d;
        --coral: #e85d4f;
        --green-bg: #e7f7ef;
        --green-border: #8fd5ae;
        --green-text: #12613a;
        --red-bg: #fff0ec;
        --red-border: #f2a197;
        --red-text: #a83224;
      }

      * {
        -webkit-tap-highlight-color: transparent;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(15, 139, 141, 0.16), transparent 34rem),
          linear-gradient(180deg, #f7f4ee 0%, #eef3f4 100%);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      input,
      select,
      button {
        font: inherit;
      }

      input,
      select {
        font-size: 16px;
      }

      main {
        height: 100svh;
        overflow: hidden;
      }

      .safe-pad {
        padding-bottom: max(1.25rem, env(safe-area-inset-bottom));
      }

      .field {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        padding: 0.75rem 0.85rem;
        outline: none;
      }

      .field:focus {
        border-color: var(--teal);
        box-shadow: 0 0 0 3px rgba(15, 139, 141, 0.14);
      }

      .btn {
        border-radius: 8px;
        min-height: 44px;
        padding: 0.72rem 1rem;
        font-weight: 750;
        transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
      }

      .btn:active {
        transform: scale(0.98);
      }

      .btn-primary {
        background: var(--navy);
        color: #ffffff;
        box-shadow: 0 8px 22px rgba(23, 32, 51, 0.18);
      }

      .btn-soft {
        background: #edf4f4;
        color: #0d6668;
      }

      .btn-danger {
        background: #fff0ec;
        color: var(--red-text);
      }

      .card {
        border: 1px solid rgba(23, 32, 51, 0.09);
        border-radius: 8px;
        background: rgba(255, 253, 248, 0.94);
        box-shadow: 0 14px 34px rgba(23, 32, 51, 0.08);
      }

      .mini-field {
        padding: 0.58rem 0.7rem;
      }

      .scroll-panel {
        min-height: 0;
        overflow-y: auto;
        overscroll-behavior: contain;
        padding-bottom: max(0.5rem, env(safe-area-inset-bottom));
      }

      .tab-button {
        border-radius: 8px;
        min-height: 38px;
        background: rgba(255, 253, 248, 0.72);
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 850;
      }

      .tab-button.is-active {
        background: var(--navy);
        color: #ffffff;
      }

      [hidden] {
        display: none !important;
      }

      .status-good {
        border-color: var(--green-border);
        background: var(--green-bg);
        color: var(--green-text);
      }

      .status-bad {
        border-color: var(--red-border);
        background: var(--red-bg);
        color: var(--red-text);
      }
    </style>
  </head>
  <body>
    <main class="safe-pad mx-auto flex w-full max-w-[430px] flex-col px-4 pb-4 pt-3 sm:pt-4">
      <header class="mb-3 rounded-lg bg-[#172033] px-4 pb-3 pt-3 text-white shadow-xl">
        <div class="flex items-start justify-between gap-3">
          <p class="text-sm font-black">Pocket Budget</p>
          <button id="resetData" class="btn min-h-0 bg-white/10 px-3 py-1.5 text-xs text-white">Reset</button>
        </div>
        <div class="mt-3 grid grid-cols-3 gap-3">
          <div>
            <p class="text-xs font-semibold text-white/65">Spent</p>
            <p id="spentTotal" class="mt-1 text-lg font-black">$0.00</p>
          </div>
          <div>
            <p class="text-xs font-semibold text-white/65">Remaining</p>
            <p id="remainingTotal" class="mt-1 text-lg font-black">$0.00</p>
          </div>
          <div>
            <p class="text-xs font-semibold text-white/65">Days</p>
            <p id="daysRemaining" class="mt-1 text-lg font-black">14</p>
          </div>
        </div>
        <div class="mt-2 h-2 overflow-hidden rounded-full bg-white/16">
          <div id="totalProgress" class="h-full rounded-full bg-[#50d890]" style="width: 0%"></div>
        </div>
        <p id="budgetStatus" class="mt-2 text-xs font-semibold text-white/80">Set a budget to start tracking.</p>
      </header>

      <details class="card mb-3 p-3">
        <summary class="flex cursor-pointer list-none items-center justify-between gap-3">
          <span class="text-base font-black">Budget setup</span>
          <span class="text-sm font-bold text-[#0d6668]">Edit</span>
        </summary>
        <div class="mt-3 flex gap-2">
          <input id="totalBudget" class="field mini-field" inputmode="decimal" type="number" min="0" step="0.01" placeholder="Total budget" />
          <button id="saveBudget" class="btn btn-primary min-h-0 shrink-0 px-4 py-2">Save</button>
        </div>
        <div class="mt-3 flex items-center justify-between gap-3">
          <p class="text-sm font-bold text-slate-600">Category budgets</p>
          <button id="addCategory" class="btn btn-soft min-h-0 px-3 py-2 text-sm">Add</button>
        </div>
        <div id="categoryBudgets" class="mt-3 space-y-2"></div>
      </details>

      <details class="card mb-3 p-3">
        <summary class="flex cursor-pointer list-none items-center justify-between gap-3">
          <span class="text-base font-black">Add Purchase</span>
          <p id="purchaseCount" class="text-xs font-bold text-slate-500">0 purchases</p>
        </summary>
        <form id="purchaseForm" class="mt-3 grid gap-2">
          <div class="grid grid-cols-[1fr_112px] gap-2">
            <input id="purchaseName" class="field mini-field" autocomplete="off" placeholder="Name" required />
            <input id="purchasePrice" class="field mini-field" inputmode="decimal" type="number" min="0.01" step="0.01" placeholder="Price" required />
          </div>
          <div class="grid grid-cols-[1fr_112px] gap-2">
            <select id="purchaseCategory" class="field mini-field"></select>
            <input id="purchaseDate" class="field mini-field" type="date" required />
          </div>
          <button class="btn btn-primary min-h-0 w-full py-2" type="submit">Add purchase</button>
        </form>
      </details>

      <nav class="mb-3 grid grid-cols-2 gap-2">
        <button id="tabPurchases" class="tab-button is-active" type="button">Purchases</button>
        <button id="tabHealth" class="tab-button" type="button">Health</button>
      </nav>

      <section id="purchasePage" class="flex min-h-0 flex-1 flex-col">
        <div class="mb-2 flex items-center justify-between gap-3">
          <h2 class="text-base font-black">Purchases</h2>
          <select id="sortMode" class="field max-w-[150px] py-2 text-sm">
            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
            <option value="priceHigh">Price high</option>
            <option value="priceLow">Price low</option>
          </select>
        </div>
        <div class="scroll-panel rounded-lg">
          <div id="purchaseList" class="grid gap-2"></div>
          <div id="emptyState" class="card p-5 text-center text-sm font-semibold text-slate-500">
            No purchases yet. Add one above and it will save on this phone.
          </div>
        </div>
      </section>

      <section id="healthPage" class="scroll-panel min-h-0 flex-1 rounded-lg" hidden>
        <div class="mb-2 flex items-center justify-between gap-3">
          <h2 class="text-base font-black">Category Health</h2>
          <p class="text-xs font-bold text-slate-500">14-day cycle</p>
        </div>
        <div id="categorySummary" class="grid grid-cols-2 gap-2"></div>
      </section>
    </main>

    <template id="categoryRowTemplate">
      <div class="grid grid-cols-[1fr_112px_40px] gap-2">
        <input class="field mini-field category-name" placeholder="Category" />
        <input class="field mini-field category-budget" inputmode="decimal" type="number" min="0" step="0.01" placeholder="Budget" />
        <button class="btn btn-danger category-remove min-h-0 px-0 py-2" type="button" aria-label="Remove category">X</button>
      </div>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
